<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In — QAcademy Nurses Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <style>
    /* ============================================================
       TOKENS
    ============================================================ */
    :root {
      --teal:        #0b7a75;
      --teal-dark:   #095e5a;
      --teal-light:  #e8f4f3;
      --teal-glow:   rgba(11,122,117,.18);
      --ink:         #1a2724;
      --muted:       #526460;
      --line:        #dce9e7;
      --bg:          #f4f8f7;
      --card:        #ffffff;
      --danger:      #c0392b;
      --danger-bg:   #fdf3f2;
      --success:     #0b7a75;
      --radius:      16px;
      --shadow:      0 20px 60px rgba(11,122,117,.10), 0 4px 16px rgba(0,0,0,.06);
    }

    /* ============================================================
       RESET + BASE
    ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }

    /* ============================================================
       ANIMATED BACKGROUND
    ============================================================ */
    .qa-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 900px 600px at 10% 15%, rgba(11,122,117,.08) 0%, transparent 65%),
        radial-gradient(ellipse 700px 500px at 92% 85%, rgba(11,122,117,.06) 0%, transparent 65%),
        linear-gradient(160deg, #f0f7f6 0%, #f8fbfb 50%, #eef5f4 100%);
      overflow: hidden;
    }
    .qa-bg::before {
      content: '';
      position: absolute;
      inset: -30%;
      background: conic-gradient(from 0deg at 50% 50%,
        rgba(11,122,117,.04) 0deg,
        transparent 90deg,
        rgba(11,122,117,.05) 180deg,
        transparent 270deg
      );
      animation: qa-spin 30s linear infinite;
    }
    @keyframes qa-spin { to { transform: rotate(360deg); } }

    /* ============================================================
       LAYOUT
    ============================================================ */
    .qa-shell {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .qa-card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 36px 32px 32px;
      border: 1px solid rgba(11,122,117,.08);
    }

    /* ============================================================
       LOGO / HEADER
    ============================================================ */
    .qa-logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 28px;
    }
    .qa-logo-mark {
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, var(--teal) 0%, var(--teal-dark) 100%);
      border-radius: 16px;
      display: grid;
      place-items: center;
      margin-bottom: 14px;
      box-shadow: 0 8px 24px rgba(11,122,117,.30);
    }
    .qa-logo-mark svg { width: 26px; height: 26px; color: #fff; }
    .qa-form-title {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -.3px;
      color: var(--ink);
      margin-bottom: 4px;
    }
    .qa-form-sub {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 28px;
      line-height: 1.5;
    }

    /* ============================================================
       FORM ELEMENTS
    ============================================================ */
    .qa-field {
      margin-bottom: 16px;
    }
    .qa-label {
      display: block;
      font-size: 12.5px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: .3px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .qa-input-wrap {
      position: relative;
    }
    .qa-input {
      width: 100%;
      padding: 12px 14px 12px 42px;
      border: 1.5px solid var(--line);
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14.5px;
      color: var(--ink);
      background: #fcfefe;
      transition: border-color .15s, box-shadow .15s, background .15s;
      outline: none;
    }
    .qa-input:focus {
      border-color: var(--teal);
      background: #fff;
      box-shadow: 0 0 0 4px var(--teal-glow);
    }
    .qa-input-icon {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      color: #9ab5b2;
      pointer-events: none;
      display: grid;
      place-items: center;
    }
    .qa-input-icon svg { width: 16px; height: 16px; }

    .qa-pw-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #9ab5b2;
      padding: 4px;
      border-radius: 6px;
      display: grid;
      place-items: center;
      transition: color .15s;
    }
    .qa-pw-toggle:hover { color: var(--teal); }
    .qa-pw-toggle svg { width: 16px; height: 16px; }

    .qa-label-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .qa-forgot {
      font-size: 12px;
      font-weight: 600;
      color: var(--teal);
      text-decoration: none;
      transition: opacity .15s;
    }
    .qa-forgot:hover { opacity: .75; text-decoration: underline; }

    /* ============================================================
       ERROR / SUCCESS BANNERS
    ============================================================ */
    .qa-banner {
      display: none;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 13.5px;
      line-height: 1.45;
      margin-bottom: 18px;
    }
    .qa-banner.show { display: flex; }
    .qa-banner.error {
      background: var(--danger-bg);
      border: 1px solid rgba(192,57,43,.18);
      color: var(--danger);
    }
    .qa-banner.success {
      background: #edf7f6;
      border: 1px solid rgba(11,122,117,.2);
      color: var(--success);
    }
    .qa-banner svg { width: 16px; height: 16px; flex-shrink: 0; margin-top: 1px; }

    /* ============================================================
       SUBMIT BUTTON
    ============================================================ */
    .qa-btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, var(--teal) 0%, var(--teal-dark) 100%);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 4px;
      box-shadow: 0 4px 14px rgba(11,122,117,.30);
    }
    .qa-btn:hover:not(:disabled) { opacity: .92; }
    .qa-btn:active:not(:disabled) { transform: scale(.99); }
    .qa-btn:disabled { opacity: .6; cursor: not-allowed; }
    .qa-btn .qa-spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: qa-spin .7s linear infinite;
      display: none;
    }
    .qa-btn.loading .qa-spinner { display: block; }
    .qa-btn.loading .qa-btn-label { display: none; }

    /* ============================================================
       FOOTER LINKS
    ============================================================ */
    .qa-card-footer {
      margin-top: 22px;
      text-align: center;
      font-size: 13.5px;
      color: var(--muted);
    }
    .qa-card-footer a {
      color: var(--teal);
      font-weight: 600;
      text-decoration: none;
    }
    .qa-card-footer a:hover { text-decoration: underline; }

  </style>
</head>
<body>

<div class="qa-bg"></div>

<main class="qa-shell">
  <div class="qa-card">

    <!-- Logo -->
    <div class="qa-logo-wrap">
      <div class="qa-logo-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
      </div>
      <div class="qa-form-title">Welcome back</div>
      <div class="qa-form-sub">Sign in to your QAcademy account</div>
    </div>

    <!-- Error banner -->
    <div class="qa-banner error" id="qa-error" role="alert">
      <svg viewBox="0 0 16 16" fill="currentColor">
        <path d="M8 1a7 7 0 100 14A7 7 0 008 1zm.75 9.25h-1.5v-1.5h1.5v1.5zm0-3h-1.5V4.75h1.5v2.5z"/>
      </svg>
      <span id="qa-error-text"></span>
    </div>

    <!-- Success banner -->
    <div class="qa-banner success" id="qa-success" role="status">
      <svg viewBox="0 0 16 16" fill="currentColor">
        <path d="M8 1a7 7 0 100 14A7 7 0 008 1zm3.03 5.03l-3.5 3.5a.75.75 0 01-1.06 0l-1.5-1.5a.75.75 0 011.06-1.06l.97.97 2.97-2.97a.75.75 0 011.06 1.06z"/>
      </svg>
      <span id="qa-success-text">Logged in! Redirecting…</span>
    </div>

    <!-- Form -->
    <form id="qa-form" novalidate autocomplete="on">

      <!-- Email -->
      <div class="qa-field">
        <label class="qa-label" for="qa-email">Email or Username</label>
        <div class="qa-input-wrap">
          <span class="qa-input-icon">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
              <rect x="1.5" y="3.5" width="13" height="9" rx="1.5"/>
              <path d="M1.5 5.5l6.5 4 6.5-4" stroke-linecap="round"/>
            </svg>
          </span>
          <input
            class="qa-input"
            type="text"
            id="qa-email"
            name="email"
            autocomplete="username"
            placeholder="your@email.com"
            spellcheck="false"
            required
          />
        </div>
      </div>

      <!-- Password -->
      <div class="qa-field">
        <div class="qa-label-row">
          <label class="qa-label" for="qa-password" style="margin-bottom:0">Password</label>
          <a class="qa-forgot" href="reset-request.html">Forgot password?</a>
        </div>
        <div class="qa-input-wrap">
          <span class="qa-input-icon">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
              <rect x="3.5" y="7" width="9" height="7" rx="1.5"/>
              <path d="M5.5 7V5a2.5 2.5 0 015 0v2" stroke-linecap="round"/>
            </svg>
          </span>
          <input
            class="qa-input"
            type="password"
            id="qa-password"
            name="password"
            autocomplete="current-password"
            placeholder="••••••••"
            required
          />
          <button type="button" class="qa-pw-toggle" id="qa-pw-toggle" aria-label="Show password">
            <svg id="qa-eye-show" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
              <path d="M1.5 8S4 3.5 8 3.5 14.5 8 14.5 8 12 12.5 8 12.5 1.5 8 1.5 8z"/>
              <circle cx="8" cy="8" r="2"/>
            </svg>
            <svg id="qa-eye-hide" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" style="display:none">
              <path d="M2 2l12 12M6.5 6.6A2 2 0 0110 9.4"/>
              <path d="M1.5 8S4 3.5 8 3.5c1.1 0 2.1.3 3 .8M12.5 5.5C13.6 6.5 14.5 8 14.5 8S12 12.5 8 12.5c-1.1 0-2.1-.3-3-.8"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Submit -->
      <button type="submit" class="qa-btn" id="qa-submit">
        <span class="qa-spinner"></span>
        <span class="qa-btn-label">Sign In</span>
      </button>

    </form>

    <div class="qa-card-footer">
      <p>Don't have an account? <a href="register.html">Create one free</a></p>
    </div>

  </div>
</main>

<script>
(function () {
  'use strict';

  // ============================================================
  // CONFIG
  // ============================================================
  var API_URL      = '/api';
  var DASHBOARD_URL = 'router.html';
  var USER_KEY     = 'qa_user';

  // ============================================================
  // DOM
  // ============================================================
  var form          = document.getElementById('qa-form');
  var emailEl       = document.getElementById('qa-email');
  var passwordEl    = document.getElementById('qa-password');
  var submitBtn     = document.getElementById('qa-submit');
  var errorBanner   = document.getElementById('qa-error');
  var errorText     = document.getElementById('qa-error-text');
  var successBanner = document.getElementById('qa-success');
  var successText   = document.getElementById('qa-success-text');
  var pwToggle      = document.getElementById('qa-pw-toggle');
  var eyeShow       = document.getElementById('qa-eye-show');
  var eyeHide       = document.getElementById('qa-eye-hide');

  // ============================================================
  // If already logged in, redirect straight to dashboard
  // Cookie is sent automatically — no token needed in body
  // ============================================================
  (function checkExistingSession() {
    fetch(API_URL + '/verify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include'
    })
    .then(function (r) { return r.json(); })
    .then(function (d) {
      if (d && d.ok) window.location.replace(DASHBOARD_URL);
    })
    .catch(function () { /* ignore — just show the login form */ });
  })();

  // ============================================================
  // Pre-fill from query string (e.g. after register redirect)
  // ============================================================
  (function prefillFromQS() {
    try {
      var qs = new URLSearchParams(window.location.search);
      var u  = qs.get('u');
      if (u) emailEl.value = decodeURIComponent(u);
      if (qs.get('reg') === '1') {
        showSuccess('Account created! Please sign in.');
      }
      if (qs.get('reset') === '1') {
        showSuccess('Password updated! Please sign in with your new password.');
      }
    } catch (e) { /* ignore */ }
  })();

  // ============================================================
  // Password show/hide toggle
  // ============================================================
  pwToggle.addEventListener('click', function () {
    var isPassword = passwordEl.type === 'password';
    passwordEl.type = isPassword ? 'text' : 'password';
    eyeShow.style.display = isPassword ? 'none' : '';
    eyeHide.style.display = isPassword ? '' : 'none';
    pwToggle.setAttribute('aria-label', isPassword ? 'Hide password' : 'Show password');
  });

  // ============================================================
  // Error code → human message
  // ============================================================
  function mapError(code) {
    var messages = {
      'invalid_credentials':   'Incorrect email or password. Please try again.',
      'invalid_login':         'Incorrect email or password. Please try again.',
      'user_inactive':         'Your account has been deactivated. Please contact support.',
      'user_expired':          'Your access has expired. Please renew your subscription.',
      'missing_fields':        'Please enter both your email and password.',
      'missing_credentials':   'Please enter both your email and password.',
      'too_many_attempts':     'Too many login attempts. Please wait a few minutes and try again.',
      'too_many_attempts_24h': 'Too many login attempts. Please try again tomorrow.',
      'network_error':         'Unable to connect. Please check your internet connection.',
    };
    return messages[code] || 'Something went wrong. Please try again.';
  }

  // ============================================================
  // Banner helpers
  // ============================================================
  function showError(msg) {
    errorText.textContent = msg;
    errorBanner.classList.add('show');
    successBanner.classList.remove('show');
  }
  function showSuccess(msg) {
    successText.textContent = msg || 'Logged in! Redirecting…';
    successBanner.classList.add('show');
    errorBanner.classList.remove('show');
  }
  function clearBanners() {
    errorBanner.classList.remove('show');
    successBanner.classList.remove('show');
  }

  // ============================================================
  // Loading state
  // ============================================================
  function setLoading(on) {
    submitBtn.disabled = on;
    submitBtn.classList.toggle('loading', on);
  }

  // ============================================================
  // Form submit
  // ============================================================
  form.addEventListener('submit', function (e) {
    e.preventDefault();
    clearBanners();

    var email    = emailEl.value.trim();
    var password = passwordEl.value;

    if (!email || !password) {
      showError(mapError('missing_fields'));
      return;
    }

    setLoading(true);

    fetch(API_URL + '/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ email: email, password: password })
    })
    .then(function (res) { return res.json(); })
    .then(function (data) {
      if (!data || !data.ok) {
        showError(mapError(data && data.error));
        setLoading(false);
        return;
      }

      // Save user profile for fast paint — NO token stored
      if (data.user) {
        try { localStorage.setItem(USER_KEY, JSON.stringify(data.user)); } catch (_) {}
      }

      showSuccess('Logged in! Redirecting to your dashboard…');

      setTimeout(function () {
        window.location.replace(DASHBOARD_URL);
      }, 700);
    })
    .catch(function (err) {
      console.error('Login error:', err);
      showError(mapError('network_error'));
      setLoading(false);
    });
  });

})();
</script>

</body>
</html>
