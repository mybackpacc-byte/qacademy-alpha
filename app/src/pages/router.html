<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QAcademy — Loading…</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <style>
    :root {
      --teal:       #0b7a75;
      --teal-dark:  #095e5a;
      --teal-glow:  rgba(11,122,117,.15);
      --ink:        #1a2724;
      --muted:      #526460;
      --line:       #dce9e7;
      --bg:         #f4f8f7;
      --card:       #ffffff;
      --danger:     #c0392b;
      --warn:       #b45309;
      --warn-bg:    #fffbeb;
      --ok:         #0b7a75;
      --ok-bg:      #edf7f6;
      --shadow:     0 20px 60px rgba(11,122,117,.10), 0 4px 16px rgba(0,0,0,.06);
      --max:        1100px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }

    .qa-bg {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 900px 600px at 8% 12%, rgba(11,122,117,.08) 0%, transparent 65%),
        radial-gradient(ellipse 700px 500px at 94% 88%, rgba(11,122,117,.06) 0%, transparent 65%),
        linear-gradient(160deg, #f0f7f6 0%, #f8fbfb 50%, #eef5f4 100%);
      overflow: hidden;
    }
    .qa-bg::before {
      content: ''; position: absolute; inset: -30%;
      background: conic-gradient(from 0deg at 50% 50%,
        rgba(11,122,117,.04) 0deg, transparent 90deg,
        rgba(11,122,117,.05) 180deg, transparent 270deg);
      filter: blur(60px);
      animation: bgSpin 35s linear infinite;
    }
    .qa-bg::after {
      content: ''; position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(11,122,117,.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(11,122,117,.035) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 40%, transparent 100%);
    }
    @keyframes bgSpin { to { transform: rotate(360deg); } }

    /* ── Top bar ── */
    .qa-topbar {
      position: sticky; top: 0; z-index: 20;
      background: rgba(244,248,247,.92);
      backdrop-filter: saturate(1.2) blur(10px);
      border-bottom: 1px solid var(--line);
    }
    .qa-topbar-inner {
      max-width: var(--max); margin: 0 auto;
      padding: 12px 20px;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .qa-brand { display: flex; gap: 10px; align-items: center; }
    .qa-logo {
      width: 36px; height: 36px; border-radius: 11px;
      background: linear-gradient(135deg, rgba(11,122,117,.16), rgba(133,153,152,.10));
      border: 1px solid rgba(11,122,117,.24);
      display: grid; place-items: center;
      font-weight: 900; font-size: 13px; color: var(--teal);
    }
    .qa-brand-name { font-size: 14px; font-weight: 700; }
    .qa-subline { font-size: 11.5px; color: var(--muted); margin-top: 1px; }
    .qa-topbar-actions { display: flex; gap: 8px; align-items: center; }
    .qa-user-chip {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 5px 10px; border-radius: 999px;
      border: 1px solid var(--line); background: #fff;
      font-size: 12px; color: var(--ink);
      max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .qa-user-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--teal); flex-shrink: 0;
    }
    .qa-btn {
      appearance: none; border: 1px solid var(--line);
      background: #fff; color: var(--ink);
      padding: 8px 13px; border-radius: 11px; cursor: pointer;
      font-weight: 700; font-size: 13px;
      box-shadow: 0 4px 12px rgba(0,0,0,.05);
      transition: opacity .15s;
    }
    .qa-btn:hover { opacity: .85; }
    .qa-btn.primary { background: var(--teal); border-color: rgba(11,122,117,.28); color: #fff; }
    .qa-btn.danger  { border-color: rgba(192,57,43,.2); color: var(--danger); }
    .qa-btn:disabled { opacity: .5; cursor: not-allowed; }

    /* ── Main shell ── */
    .qa-shell {
      position: relative; z-index: 1;
      max-width: var(--max); margin: 0 auto;
      padding: 28px 20px 48px;
    }

    /* ── Status card ── */
    .qa-status-card {
      background: var(--card); border: 1px solid var(--line);
      border-radius: 18px; box-shadow: var(--shadow);
      padding: 24px; margin-bottom: 20px;
      display: flex; gap: 16px; align-items: flex-start;
      justify-content: space-between; flex-wrap: wrap;
    }
    .qa-status-left { flex: 1; min-width: 0; }
    .qa-status-title { font-size: 18px; font-weight: 800; margin-bottom: 4px; }
    .qa-status-msg { font-size: 13px; color: var(--muted); line-height: 1.5; max-width: 600px; }
    .qa-spinner {
      width: 20px; height: 20px; border-radius: 50%;
      border: 2.5px solid rgba(0,0,0,.12);
      border-top-color: var(--teal);
      animation: spin .8s linear infinite;
      flex-shrink: 0; margin-top: 2px;
    }
    .qa-spinner.hidden { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .qa-retry {
      display: none; align-items: center; gap: 6px;
      font-size: 13px; font-weight: 700; color: var(--teal);
      background: none; border: none; cursor: pointer; padding: 0;
    }
    .qa-retry.show { display: inline-flex; }
    .qa-retry svg { width: 14px; height: 14px; }

    /* Pills */
    .qa-pills { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
    .qa-pill {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 9px; border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(0,0,0,.02);
      font-size: 11.5px; color: rgba(26,39,36,.76); font-weight: 700;
    }
    .qa-pill.ok   { border-color: rgba(11,122,117,.22); background: var(--ok-bg);  color: var(--ok); }
    .qa-pill.warn { border-color: rgba(180,83,9,.22);   background: var(--warn-bg); color: var(--warn); }
    .qa-pill.bad  { border-color: rgba(192,57,43,.22);  background: #fdf3f2; color: var(--danger); }

    /* ── Action grid ── */
    .qa-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 16px;
    }

    .qa-action-card {
      background: var(--card); border: 1px solid var(--line);
      border-radius: 18px; box-shadow: 0 8px 24px rgba(0,0,0,.05);
      overflow: hidden;
      display: flex; flex-direction: column;
    }
    .qa-action-head {
      padding: 18px 18px 14px;
      border-bottom: 1px solid var(--line);
    }
    .qa-action-icon {
      width: 42px; height: 42px; border-radius: 12px;
      display: grid; place-items: center;
      margin-bottom: 12px;
    }
    .qa-action-icon svg { width: 20px; height: 20px; }
    .qa-action-icon.teal { background: var(--ok-bg); color: var(--teal); border: 1px solid rgba(11,122,117,.15); }
    .qa-action-icon.blue { background: #eff6ff; color: #2563eb; border: 1px solid rgba(37,99,235,.15); }

    .qa-action-title { font-size: 15px; font-weight: 800; margin-bottom: 4px; }
    .qa-action-sub   { font-size: 12.5px; color: var(--muted); line-height: 1.5; }

    .qa-card-alert {
      display: none; margin: 12px 18px 0;
      padding: 10px 13px; border-radius: 10px;
      font-size: 12.5px; line-height: 1.45;
    }
    .qa-card-alert.show { display: block; }
    .qa-card-alert.info    { background: #eff6ff; border: 1px solid rgba(37,99,235,.18); color: #2563eb; }
    .qa-card-alert.error   { background: #fdf3f2; border: 1px solid rgba(192,57,43,.18); color: var(--danger); }
    .qa-card-alert.warning { background: var(--warn-bg); border: 1px solid rgba(180,83,9,.2); color: var(--warn); }

    .qa-action-foot {
      padding: 14px 18px 18px;
      margin-top: auto;
    }
    .qa-action-btn {
      width: 100%; padding: 11px;
      background: linear-gradient(135deg, var(--teal) 0%, var(--teal-dark) 100%);
      color: #fff; border: none; border-radius: 11px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px; font-weight: 700; cursor: pointer;
      transition: opacity .15s;
      box-shadow: 0 4px 12px rgba(11,122,117,.25);
    }
    .qa-action-btn:hover:not(:disabled) { opacity: .9; }
    .qa-action-btn:disabled { opacity: .55; cursor: not-allowed; }
    .qa-action-btn.secondary {
      background: #fff;
      border: 1.5px solid var(--line);
      color: var(--ink);
      box-shadow: none;
    }

    @media (max-width: 600px) {
      .qa-shell { padding: 20px 14px 40px; }
      .qa-topbar-inner { padding: 10px 14px; }
      .qa-user-chip { display: none; }
    }
  </style>
</head>
<body>

<div class="qa-bg"></div>

<!-- Top bar -->
<header class="qa-topbar">
  <div class="qa-topbar-inner">
    <div class="qa-brand">
      <div class="qa-logo">QA</div>
      <div>
        <div class="qa-brand-name">QAcademy Nurses Hub</div>
        <div class="qa-subline" id="qa-subline">Checking your session…</div>
      </div>
    </div>
    <div class="qa-topbar-actions">
      <div class="qa-user-chip" id="qa-user-chip" style="display:none">
        <div class="qa-user-dot"></div>
        <span id="qa-user-name"></span>
      </div>
      <button class="qa-btn danger" id="qa-signout">Sign out</button>
    </div>
  </div>
</header>

<main class="qa-shell">

  <!-- Status card -->
  <div class="qa-status-card">
    <div class="qa-status-left">
      <div class="qa-status-title" id="qa-status-title">Verifying your session…</div>
      <div class="qa-status-msg"   id="qa-status-msg">Please wait a moment.</div>
      <div class="qa-pills">
        <span class="qa-pill warn" id="qa-pill-auth">Auth: checking…</span>
        <span class="qa-pill" id="qa-pill-ta">Portal: —</span>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:10px;flex-shrink:0">
      <div class="qa-spinner" id="qa-spinner"></div>
      <button class="qa-retry" id="qa-retry">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M13.5 8A5.5 5.5 0 112.5 5.5"/>
          <path d="M2.5 2v3.5H6"/>
        </svg>
        Retry
      </button>
    </div>
  </div>

  <!-- Action cards -->
  <div class="qa-grid">

    <!-- Dashboard card -->
    <div class="qa-action-card">
      <div class="qa-action-head">
        <div class="qa-action-icon teal">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
            <path d="M2 17l10 5 10-5"/>
            <path d="M2 12l10 5 10-5"/>
          </svg>
        </div>
        <div class="qa-action-title">My Dashboard</div>
        <div class="qa-action-sub">View your profile, active courses, and subscription.</div>
        <div class="qa-card-alert" id="qa-lic-alert">
          <span id="qa-lic-alert-text"></span>
        </div>
      </div>
      <div class="qa-action-foot">
        <button class="qa-action-btn" id="qa-btn-lic" disabled>Go to Dashboard</button>
      </div>
    </div>

    <!-- Courses card -->
    <div class="qa-action-card">
      <div class="qa-action-head">
        <div class="qa-action-icon blue">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 19.5A2.5 2.5 0 016.5 17H20"/>
            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/>
          </svg>
        </div>
        <div class="qa-action-title">My Courses</div>
        <div class="qa-action-sub">Access your quiz bank and start practising.</div>
        <div class="qa-card-alert" id="qa-ta-alert">
          <span id="qa-ta-alert-text"></span>
        </div>
      </div>
      <div class="qa-action-foot">
        <button class="qa-action-btn secondary" id="qa-btn-ta" disabled>Coming Soon</button>
      </div>
    </div>

  </div>

</main>

<script>
(function () {
  'use strict';

  // ============================================================
  // CONFIG
  // ============================================================
  var API_URL       = '/api';
  var URL_LOGIN     = 'login.html';
  var URL_DASHBOARD = 'dashboard.html';
  var USER_KEY      = 'qa_user';

  // ============================================================
  // DOM helpers
  // ============================================================
  function $(id) { return document.getElementById(id); }

  function setStatus(title, msg) {
    $('qa-status-title').textContent = title || '';
    $('qa-status-msg').textContent   = msg   || '';
  }

  function setPill(id, text, cls) {
    var el = $(id);
    el.textContent = text;
    el.className = 'qa-pill' + (cls ? ' ' + cls : '');
  }

  function showSpinner(on) {
    $('qa-spinner').classList.toggle('hidden', !on);
  }

  function showRetry(on) {
    $('qa-retry').classList.toggle('show', on);
  }

  function enableBtn(id, on) {
    var b = $(id);
    if (b) b.disabled = !on;
  }

  function showCardAlert(id, textId, msg, type) {
    var el = $(id);
    if (!el) return;
    if (msg) {
      $(textId).textContent = msg;
      el.className = 'qa-card-alert show ' + (type || 'info');
    } else {
      el.classList.remove('show');
    }
  }

  // ============================================================
  // Session helpers — no TOKEN_KEY, cookie handles auth
  // ============================================================
  function clearSession() {
    try { localStorage.removeItem(USER_KEY); } catch (_) {}
  }

  function safeReturnTo(raw) {
    raw = String(raw || '').trim();
    if (!raw || raw[0] !== '/') return '';
    if (raw.startsWith('//')) return '';
    if (raw.toLowerCase().includes('javascript:')) return '';
    return raw;
  }

  function getQS(name) {
    try { return new URLSearchParams(location.search || '').get(name) || ''; }
    catch (_) { return ''; }
  }

  // ============================================================
  // Sign out — POST to /api/logout to clear the cookie
  // ============================================================
  $('qa-signout').addEventListener('click', function () {
    clearSession();
    fetch(API_URL + '/logout', {
      method: 'POST',
      credentials: 'include'
    }).finally(function () {
      window.location.replace(URL_LOGIN);
    });
  });

  // ============================================================
  // Retry button
  // ============================================================
  $('qa-retry').addEventListener('click', function () {
    runRouter();
  });

  // ============================================================
  // Main router logic
  // ============================================================
  async function runRouter() {
    showSpinner(true);
    showRetry(false);
    enableBtn('qa-btn-lic', false);
    enableBtn('qa-btn-ta', false);

    setPill('qa-pill-auth', 'Auth: checking…', 'warn');
    setPill('qa-pill-ta',   'Portal: checking…', 'warn');

    // ── Handle return_to ──
    var rt = safeReturnTo(getQS('return_to'));
    if (rt) {
      try { sessionStorage.setItem('qa_return_to', rt); } catch (_) {}
    }

    // ── Verify session via cookie ──
    setStatus('Verifying your session…', 'Checking your account.');

    var verifyResult = null;
    try {
      var res = await fetch(API_URL + '/verify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include'
        // No body needed — cookie is sent automatically
      });
      verifyResult = await res.json();
    } catch (e) {
      verifyResult = { ok: false, error: 'network_error' };
    }

    if (!verifyResult || verifyResult.ok !== true) {
      var errCode = (verifyResult && verifyResult.error) || 'verify_failed';
      if (['missing_token','expired','not_found','invalid_token','user_inactive','no_session'].includes(errCode)) {
        clearSession();
      }
      showSpinner(false);
      showRetry(true);
      $('qa-subline').textContent = 'Access denied';
      setStatus('Session problem', 'Please sign in again.');
      setPill('qa-pill-auth', 'Auth: ' + errCode, 'bad');
      setPill('qa-pill-ta',   'Portal: —', '');
      showCardAlert('qa-lic-alert', 'qa-lic-alert-text',
        'Your session has expired or is invalid. Please sign in again.', 'error');
      enableBtn('qa-btn-lic', true);
      $('qa-btn-lic').onclick = function () { window.location.replace(URL_LOGIN); };
      $('qa-btn-lic').textContent = 'Go to Login';
      return;
    }

    // ── Auth OK ──
    var user        = verifyResult.user || {};
    var displayName = (user.name || user.username || 'Signed in').trim();
    var email       = (user.email || '').trim();

    // Show user chip
    $('qa-user-name').textContent = email ? displayName + ' · ' + email : displayName;
    $('qa-user-chip').style.display = '';
    $('qa-subline').textContent = 'Signed in';

    // Cache user for fast paint on dashboard
    try { localStorage.setItem(USER_KEY, JSON.stringify(user)); } catch (_) {}

    setPill('qa-pill-auth', 'Auth: verified', 'ok');

    // ── Check access ──
    var access  = verifyResult.access || {};
    var courses = verifyResult.courses || [];
    var hasAccess = access.has_access === true;

    if (hasAccess) {
      setPill('qa-pill-ta', 'Portal: active', 'ok');
      showCardAlert('qa-lic-alert', 'qa-lic-alert-text', '', '');
    } else {
      setPill('qa-pill-ta', 'Portal: trial', 'warn');
      showCardAlert('qa-lic-alert', 'qa-lic-alert-text',
        'You are on a free trial. Upgrade to unlock full access.', 'warning');
    }

    showSpinner(false);

    // ── Check return_to ──
    var savedRt = '';
    try { savedRt = safeReturnTo(sessionStorage.getItem('qa_return_to') || ''); } catch (_) {}
    if (savedRt) {
      try { sessionStorage.removeItem('qa_return_to'); } catch (_) {}
      setStatus('Redirecting…', 'Taking you to your destination.');
      setTimeout(function () { window.location.replace(savedRt); }, 400);
      return;
    }

    // ── Enable dashboard button ──
    setStatus('Welcome back, ' + displayName + '!', 'Your session is active. Choose where to go.');
    enableBtn('qa-btn-lic', true);
    $('qa-btn-lic').onclick = function () {
      window.location.replace(URL_DASHBOARD);
    };

    // Courses button — coming soon
    showCardAlert('qa-ta-alert', 'qa-ta-alert-text',
      'Quiz courses are coming in Phase 3. Stay tuned!', 'info');
  }

  // ── Boot ──
  runRouter();

})();
</script>

</body>
</html>
