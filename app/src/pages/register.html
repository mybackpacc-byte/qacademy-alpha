<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — QAcademy Nurses Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --teal:       #0b7a75;
      --teal-dark:  #095e5a;
      --teal-glow:  rgba(11,122,117,.18);
      --ink:        #1a2724;
      --muted:      #526460;
      --line:       #dce9e7;
      --bg:         #f4f8f7;
      --card:       #ffffff;
      --danger:     #c0392b;
      --danger-bg:  #fdf3f2;
      --success:    #0b7a75;
      --radius:     16px;
      --shadow:     0 20px 60px rgba(11,122,117,.10), 0 4px 16px rgba(0,0,0,.06);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }

    .qa-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 900px 600px at 10% 15%, rgba(11,122,117,.08) 0%, transparent 65%),
        radial-gradient(ellipse 700px 500px at 92% 85%, rgba(11,122,117,.06) 0%, transparent 65%),
        linear-gradient(160deg, #f0f7f6 0%, #f8fbfb 50%, #eef5f4 100%);
    }

    .qa-shell {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 32px 16px 48px;
    }

    .qa-card {
      width: 100%;
      max-width: 480px;
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 36px 32px 32px;
      border: 1px solid rgba(11,122,117,.08);
    }

    /* Header */
    .qa-logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 24px;
    }
    .qa-logo-mark {
      width: 50px;
      height: 50px;
      background: linear-gradient(135deg, var(--teal) 0%, var(--teal-dark) 100%);
      border-radius: 14px;
      display: grid;
      place-items: center;
      margin-bottom: 12px;
      box-shadow: 0 6px 20px rgba(11,122,117,.28);
    }
    .qa-logo-mark svg { width: 24px; height: 24px; color: #fff; }
    .qa-form-title {
      font-size: 21px;
      font-weight: 800;
      letter-spacing: -.3px;
      color: var(--ink);
      margin-bottom: 3px;
      text-align: center;
    }
    .qa-form-sub {
      font-size: 13.5px;
      color: var(--muted);
      text-align: center;
      line-height: 1.5;
    }

    /* Banners */
    .qa-banner {
      display: none;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 13.5px;
      line-height: 1.45;
      margin-bottom: 18px;
      margin-top: 16px;
    }
    .qa-banner.show { display: flex; }
    .qa-banner.error {
      background: var(--danger-bg);
      border: 1px solid rgba(192,57,43,.18);
      color: var(--danger);
    }
    .qa-banner.success {
      background: #edf7f6;
      border: 1px solid rgba(11,122,117,.2);
      color: var(--success);
    }
    .qa-banner svg { width: 16px; height: 16px; flex-shrink: 0; margin-top: 1px; }

    /* Form fields */
    .qa-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }
    .qa-field { margin-bottom: 16px; }
    .qa-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: .3px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .qa-input-wrap { position: relative; }
    .qa-input {
      width: 100%;
      padding: 11px 14px 11px 40px;
      border: 1.5px solid var(--line);
      border-radius: 11px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--ink);
      background: #fcfefe;
      transition: border-color .15s, box-shadow .15s;
      outline: none;
    }
    .qa-input:focus {
      border-color: var(--teal);
      background: #fff;
      box-shadow: 0 0 0 4px var(--teal-glow);
    }
    .qa-input.error { border-color: var(--danger); }
    .qa-input-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #9ab5b2;
      pointer-events: none;
      display: grid;
      place-items: center;
    }
    .qa-input-icon svg { width: 15px; height: 15px; }
    /* no-icon variant */
    .qa-input.no-icon { padding-left: 14px; }

    /* Password toggle */
    .qa-pw-toggle {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #9ab5b2;
      padding: 4px;
      border-radius: 6px;
      display: grid;
      place-items: center;
      transition: color .15s;
    }
    .qa-pw-toggle:hover { color: var(--teal); }
    .qa-pw-toggle svg { width: 15px; height: 15px; }

    /* Password strength */
    .qa-strength { margin-top: 8px; display: none; }
    .qa-strength.show { display: block; }
    .qa-strength-bars {
      display: flex;
      gap: 4px;
      margin-bottom: 4px;
    }
    .qa-strength-bar {
      height: 4px;
      flex: 1;
      border-radius: 99px;
      background: var(--line);
      transition: background .2s;
    }
    .qa-strength-bar.weak   { background: #e74c3c; }
    .qa-strength-bar.fair   { background: #f39c12; }
    .qa-strength-bar.strong { background: var(--teal); }
    .qa-strength-label { font-size: 11.5px; color: var(--muted); }

    /* Submit */
    .qa-btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, var(--teal) 0%, var(--teal-dark) 100%);
      color: #fff;
      border: none;
      border-radius: 11px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 4px;
      box-shadow: 0 4px 14px rgba(11,122,117,.28);
    }
    .qa-btn:hover:not(:disabled) { opacity: .92; }
    .qa-btn:active:not(:disabled) { transform: scale(.99); }
    .qa-btn:disabled { opacity: .6; cursor: not-allowed; }
    .qa-btn .qa-spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: qa-spin .7s linear infinite;
      display: none;
    }
    .qa-btn.loading .qa-spinner { display: block; }
    .qa-btn.loading .qa-btn-label { display: none; }
    @keyframes qa-spin { to { transform: rotate(360deg); } }

    /* Select */
    select.qa-input { padding-left: 14px; appearance: none; cursor: pointer; }

    /* Footer */
    .qa-footer {
      margin-top: 20px;
      text-align: center;
      font-size: 13.5px;
      color: var(--muted);
    }
    .qa-footer a {
      color: var(--teal);
      font-weight: 600;
      text-decoration: none;
    }
    .qa-footer a:hover { text-decoration: underline; }

    .qa-disclaimer {
      font-size: 11.5px;
      color: #8aadaa;
      text-align: center;
      margin-top: 14px;
      line-height: 1.5;
    }

    @media (max-width: 480px) {
      .qa-card { padding: 28px 20px 24px; }
      .qa-row { grid-template-columns: 1fr; gap: 0; }
    }
  </style>
</head>
<body>

<div class="qa-bg"></div>

<main class="qa-shell">
  <div class="qa-card">

    <!-- Header -->
    <div class="qa-logo-wrap">
      <div class="qa-logo-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
      </div>
      <div class="qa-form-title">Create your account</div>
      <div class="qa-form-sub">Start practising today.</div>
    </div>

    <!-- Error banner -->
    <div class="qa-banner error" id="qa-error" role="alert" aria-live="polite">
      <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 1a7 7 0 100 14A7 7 0 008 1zm.75 9.75h-1.5v-1.5h1.5v1.5zm0-3h-1.5v-4h1.5v4z"/></svg>
      <span id="qa-error-text">Something went wrong.</span>
    </div>

    <!-- Success banner -->
    <div class="qa-banner success" id="qa-success" role="status" aria-live="polite">
      <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 1a7 7 0 100 14A7 7 0 008 1zm3.28 5.03l-4 4a.75.75 0 01-1.06 0l-2-2a.75.75 0 111.06-1.06L6.75 8.44l3.47-3.47a.75.75 0 111.06 1.06z"/></svg>
      <span id="qa-success-text">Account created! Redirecting to login…</span>
    </div>

    <form id="qa-form" novalidate autocomplete="on">

      <!-- Name row -->
      <div class="qa-row">
        <div class="qa-field" style="margin-bottom:0">
          <label class="qa-label" for="qa-forename">First Name *</label>
          <div class="qa-input-wrap">
            <span class="qa-input-icon">
              <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
                <circle cx="8" cy="5" r="3"/>
                <path d="M2 14c0-3.314 2.686-6 6-6s6 2.686 6 6" stroke-linecap="round"/>
              </svg>
            </span>
            <input class="qa-input" type="text" id="qa-forename" name="forename"
              autocomplete="given-name" placeholder="Kofi" required />
          </div>
        </div>
        <div class="qa-field" style="margin-bottom:0">
          <label class="qa-label" for="qa-surname">Last Name *</label>
          <div class="qa-input-wrap">
            <span class="qa-input-icon">
              <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
                <circle cx="8" cy="5" r="3"/>
                <path d="M2 14c0-3.314 2.686-6 6-6s6 2.686 6 6" stroke-linecap="round"/>
              </svg>
            </span>
            <input class="qa-input" type="text" id="qa-surname" name="surname"
              autocomplete="family-name" placeholder="Mensah" required />
          </div>
        </div>
      </div>

      <!-- Email -->
      <div class="qa-field">
        <label class="qa-label" for="qa-email">Email Address *</label>
        <div class="qa-input-wrap">
          <span class="qa-input-icon">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
              <rect x="1.5" y="3.5" width="13" height="9" rx="1.5"/>
              <path d="M1.5 5.5l6.5 4 6.5-4" stroke-linecap="round"/>
            </svg>
          </span>
          <input class="qa-input" type="email" id="qa-email" name="email"
            autocomplete="email" placeholder="your@email.com" required />
        </div>
      </div>

      <!-- Phone -->
      <div class="qa-field">
        <label class="qa-label" for="qa-phone">Phone Number <span style="font-weight:400;text-transform:none">(optional)</span></label>
        <div class="qa-input-wrap">
          <span class="qa-input-icon">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
              <rect x="4" y="1" width="8" height="14" rx="2"/>
              <circle cx="8" cy="12.5" r=".75" fill="currentColor" stroke="none"/>
            </svg>
          </span>
          <input class="qa-input" type="tel" id="qa-phone" name="phone"
            autocomplete="tel" placeholder="0244 000 000" />
        </div>
      </div>

      <!-- Programme -->
      <div class="qa-field">
        <label class="qa-label" for="qa-program">Programme <span style="font-weight:400;text-transform:none">(optional)</span></label>
        <select class="qa-input" id="qa-program" name="program_id">
          <option value="">— Select your programme —</option>
          <option value="RN">RN — Registered Nurse</option>
          <option value="RM">RM — Registered Midwife</option>
          <option value="RPHN">RPHN — Public Health Nurse</option>
          <option value="RMHN">RMHN — Mental Health Nurse</option>
          <option value="NACNAP">NACNAP — Community Nurse</option>
        </select>
      </div>

      <!-- Password -->
      <div class="qa-field">
        <label class="qa-label" for="qa-password">Password *</label>
        <div class="qa-input-wrap">
          <span class="qa-input-icon">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
              <rect x="3.5" y="7" width="9" height="7" rx="1.5"/>
              <path d="M5.5 7V5a2.5 2.5 0 015 0v2" stroke-linecap="round"/>
            </svg>
          </span>
          <input class="qa-input" type="password" id="qa-password" name="password"
            autocomplete="new-password" placeholder="Min. 8 characters" required />
          <button type="button" class="qa-pw-toggle" id="qa-pw-toggle" aria-label="Show password">
            <svg id="qa-eye-show" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
              <path d="M1.5 8S4 3.5 8 3.5 14.5 8 14.5 8 12 12.5 8 12.5 1.5 8 1.5 8z"/>
              <circle cx="8" cy="8" r="2"/>
            </svg>
            <svg id="qa-eye-hide" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" style="display:none">
              <path d="M2 2l12 12M6.5 6.6A2 2 0 0110 9.4"/>
              <path d="M1.5 8S4 3.5 8 3.5c1.1 0 2.1.3 3 .8M12.5 5.5C13.6 6.5 14.5 8 14.5 8S12 12.5 8 12.5c-1.1 0-2.1-.3-3-.8"/>
            </svg>
          </button>
        </div>
        <!-- Strength indicator -->
        <div class="qa-strength" id="qa-strength">
          <div class="qa-strength-bars">
            <div class="qa-strength-bar" id="qa-bar-1"></div>
            <div class="qa-strength-bar" id="qa-bar-2"></div>
            <div class="qa-strength-bar" id="qa-bar-3"></div>
          </div>
          <div class="qa-strength-label" id="qa-strength-label"></div>
        </div>
      </div>

      <!-- Confirm Password -->
      <div class="qa-field">
        <label class="qa-label" for="qa-password2">Confirm Password *</label>
        <div class="qa-input-wrap">
          <span class="qa-input-icon">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
              <rect x="3.5" y="7" width="9" height="7" rx="1.5"/>
              <path d="M5.5 7V5a2.5 2.5 0 015 0v2" stroke-linecap="round"/>
            </svg>
          </span>
          <input class="qa-input" type="password" id="qa-password2" name="password2"
            autocomplete="new-password" placeholder="Repeat your password" required />
        </div>
      </div>

      <!-- Submit -->
      <button type="submit" class="qa-btn" id="qa-submit">
        <span class="qa-spinner"></span>
        <span class="qa-btn-label">Create Account</span>
      </button>

      <p class="qa-disclaimer">
        Your data is stored securely.
      </p>

    </form>

    <p class="qa-footer">
      Already have an account? <a href="login.html">Sign in here</a>
    </p>

  </div>
</main>

<script>
(function () {
  'use strict';

  // ============================================================
  // CONFIG
  // ============================================================
  var API_URL   = '/api';
  var LOGIN_URL = 'login.html';

  // ============================================================
  // DOM
  // ============================================================
  var form        = document.getElementById('qa-form');
  var forenameEl  = document.getElementById('qa-forename');
  var surnameEl   = document.getElementById('qa-surname');
  var emailEl     = document.getElementById('qa-email');
  var phoneEl     = document.getElementById('qa-phone');
  var programEl   = document.getElementById('qa-program');
  var passwordEl  = document.getElementById('qa-password');
  var password2El = document.getElementById('qa-password2');
  var submitBtn   = document.getElementById('qa-submit');

  var errorBanner   = document.getElementById('qa-error');
  var errorText     = document.getElementById('qa-error-text');
  var successBanner = document.getElementById('qa-success');
  var successText   = document.getElementById('qa-success-text');

  var pwToggle      = document.getElementById('qa-pw-toggle');
  var eyeShow       = document.getElementById('qa-eye-show');
  var eyeHide       = document.getElementById('qa-eye-hide');
  var strengthWrap  = document.getElementById('qa-strength');
  var bar1          = document.getElementById('qa-bar-1');
  var bar2          = document.getElementById('qa-bar-2');
  var bar3          = document.getElementById('qa-bar-3');
  var strengthLabel = document.getElementById('qa-strength-label');

  // ============================================================
  // Password show/hide
  // ============================================================
  pwToggle.addEventListener('click', function () {
    var isPassword = passwordEl.type === 'password';
    passwordEl.type = isPassword ? 'text' : 'password';
    eyeShow.style.display = isPassword ? 'none' : '';
    eyeHide.style.display = isPassword ? '' : 'none';
    pwToggle.setAttribute('aria-label', isPassword ? 'Hide password' : 'Show password');
  });

  // ============================================================
  // Password strength meter
  // ============================================================
  passwordEl.addEventListener('input', function () {
    var val = passwordEl.value;
    if (!val) {
      strengthWrap.classList.remove('show');
      return;
    }
    strengthWrap.classList.add('show');

    var score = 0;
    if (val.length >= 8)  score++;
    if (/[A-Z]/.test(val) || /[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val) || val.length >= 12) score++;

    var labels = ['', 'Weak', 'Fair', 'Strong'];
    var classes = ['', 'weak', 'fair', 'strong'];

    [bar1, bar2, bar3].forEach(function (b) { b.className = 'qa-strength-bar'; });
    if (score >= 1) bar1.classList.add(classes[score]);
    if (score >= 2) bar2.classList.add(classes[score]);
    if (score >= 3) bar3.classList.add(classes[score]);
    strengthLabel.textContent = labels[score] || '';
  });

  // ============================================================
  // Error code → message
  // ============================================================
  function mapError(code) {
    var messages = {
      'missing_fields':        'Please fill in all required fields.',
      'password_policy_failed':'Password must be at least 8 characters.',
      'passwords_mismatch':    'Passwords do not match. Please check and try again.',
      'email_exists':          'This email is already registered. Try signing in instead.',
      'username_exists':       'That username is taken. Please try a different one.',
      'invalid_username':      'Username format is invalid.',
      'registration_failed':   'Registration failed. Please try again.',
      'network_error':         'Unable to connect. Please check your internet connection.',
    };
    return messages[code] || 'Something went wrong. Please try again.';
  }

  // ============================================================
  // Banners
  // ============================================================
  function showError(msg) {
    errorText.textContent = msg;
    errorBanner.classList.add('show');
    successBanner.classList.remove('show');
    errorBanner.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
  function showSuccess(msg) {
    successText.textContent = msg || 'Account created! Redirecting…';
    successBanner.classList.add('show');
    errorBanner.classList.remove('show');
  }
  function clearBanners() {
    errorBanner.classList.remove('show');
    successBanner.classList.remove('show');
  }

  // ============================================================
  // Loading
  // ============================================================
  function setLoading(on) {
    submitBtn.disabled = on;
    submitBtn.classList.toggle('loading', on);
  }

  // ============================================================
  // Form submit
  // ============================================================
  form.addEventListener('submit', function (e) {
    e.preventDefault();
    clearBanners();

    var forename   = forenameEl.value.trim();
    var surname    = surnameEl.value.trim();
    var email      = emailEl.value.trim().toLowerCase();
    var phone      = phoneEl.value.trim();
    var program_id = programEl.value;
    var password   = passwordEl.value;
    var password2  = password2El.value;

    if (!forename || !surname || !email || !password) {
      showError(mapError('missing_fields'));
      return;
    }
    if (password.length < 8) {
      showError(mapError('password_policy_failed'));
      return;
    }
    if (password !== password2) {
      showError(mapError('passwords_mismatch'));
      password2El.classList.add('error');
      password2El.focus();
      return;
    }
    password2El.classList.remove('error');

    setLoading(true);

    fetch(API_URL + '/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({
        forename:     forename,
        surname:      surname,
        email:        email,
        password:     password,
        phone_number: phone,
        program_id:   program_id
      })
    })
    .then(function (res) { return res.json(); })
    .then(function (data) {
      if (!data || !data.ok) {
        showError(mapError(data && data.error));
        setLoading(false);
        return;
      }

      // Success — redirect to login (no session set on register)
      showSuccess('Account created! Taking you to login…');

      var redirectUrl = LOGIN_URL + '?reg=1&u=' + encodeURIComponent(email);

      setTimeout(function () {
        window.location.replace(redirectUrl);
      }, 900);
    })
    .catch(function (err) {
      console.error('Register error:', err);
      showError(mapError('network_error'));
      setLoading(false);
    });

  });

  // Clear error highlight on confirm password change
  password2El.addEventListener('input', function () {
    password2El.classList.remove('error');
  });

})();
</script>

</body>
</html>
